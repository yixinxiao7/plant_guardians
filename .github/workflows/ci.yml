# Plant Guardians CI Pipeline
# Runs on every push and all pull requests targeting main.
# Jobs: backend-test → frontend-test → docker-build → deploy-staging (main only)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── Backend: Test ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plant_guardians
          POSTGRES_PASSWORD: plant_guardians_ci
          POSTGRES_DB: plant_guardians_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plant_guardians -d plant_guardians_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://plant_guardians:plant_guardians_ci@localhost:5432/plant_guardians_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 7
      # Gemini API is stubbed in tests — no real key needed
      GEMINI_API_KEY: stub-key-ci
      UPLOAD_DIR: /tmp/plant_guardians_uploads
      MAX_UPLOAD_SIZE_MB: 5
      FRONTEND_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Security audit (production deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ─── Frontend: Test + Build ─────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build (verify no build errors)
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
        run: npm run build

      - name: Security audit (production deps only)
        run: npm audit --omit=dev --audit-level=high

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─── Docker Build Validation ─────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          tags: plant-guardians-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: false
          tags: plant-guardians-frontend:ci
          build-args: VITE_API_BASE_URL=http://localhost:3000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate dev Docker Compose config
        run: docker compose -f infra/docker-compose.yml config
        env:
          POSTGRES_USER: plant_guardians
          POSTGRES_PASSWORD: ci-validation-only
          POSTGRES_DB: plant_guardians_dev

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  # Runs only on push to main after all checks pass.
  # Requires: STAGING_HOST, STAGING_SSH_KEY, STAGING_ENV_FILE set as repo secrets.
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to staging server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER || 'deploy' }}
          STAGING_SSH_KEY: ~/.ssh/staging_key
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x infra/deploy-staging.sh
          ./infra/deploy-staging.sh
