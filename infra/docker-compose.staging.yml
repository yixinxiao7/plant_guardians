# docker-compose.staging.yml — Staging Environment
# Deploys backend + frontend + PostgreSQL as a single-host staging stack.
# Usage: docker compose -f infra/docker-compose.staging.yml up -d
# Requires: all variables set in .env.staging (never committed)

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pg_staging
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Do NOT expose port 5432 externally in staging
    expose:
      - "5432"

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: backend_staging
    restart: always
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-7}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads_staging:/app/uploads
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Migration runner — runs once on each deploy then exits
  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: migrate_staging
    command: ["node", "node_modules/.bin/knex", "migrate:latest"]
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: frontend_staging
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata_staging:
    name: plant_guardians_pgdata_staging
  uploads_staging:
    name: plant_guardians_uploads_staging
