# nginx.prod.conf — Production reverse proxy configuration
# Handles:
#   - HTTP → HTTPS redirect (port 80)
#   - HTTPS termination with TLS 1.2/1.3 (port 443)
#   - API reverse proxy  → backend container at :3000
#   - React SPA static files with SPA fallback routing
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#
# SSL certificates are mounted by docker-compose.prod.yml at:
#   /etc/ssl/certs/plant-guardians/fullchain.pem
#   /etc/ssl/certs/plant-guardians/privkey.pem
#
# Provision certs BEFORE running docker compose up:
#   Option A: Let's Encrypt / certbot
#     certbot certonly --standalone -d yourdomain.com
#     Map /etc/letsencrypt/live/yourdomain.com → ./ssl/ (see deploy-runbook.md)
#   Option B: Bring-your-own CA cert
#     Place fullchain.pem and privkey.pem in infra/ssl/ (gitignored)

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow Let's Encrypt HTTP-01 challenge through (certbot webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server — SSL termination + SPA + API proxy ────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── SSL Certificates ──────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/plant-guardians/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/plant-guardians/privkey.pem;

    # ── TLS Hardening (Mozilla Modern profile) ────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — speeds up TLS handshake by pre-fetching cert revocation status
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security Headers ──────────────────────────────────────────────────────
    # HSTS — tell browsers to always use HTTPS for this domain (1 year)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"               always;

    # ── Static files root ─────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from error pages and Server header
    server_tokens off;

    # ── API reverse proxy → backend:3000 ─────────────────────────────────────
    # All /api/* requests are forwarded to the Express backend container.
    # client_max_body_size matches MAX_UPLOAD_SIZE_MB + 1 MB headroom.
    location /api/ {
        proxy_pass            http://backend:3000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;

        # Allow plant photo uploads (MAX_UPLOAD_SIZE_MB=5 + 1 MB margin)
        client_max_body_size  6M;
    }

    # ── Static asset caching (Vite hashes filenames → safe to cache 1 year) ──
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── index.html — never cache (must pick up new deploys immediately) ───────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        expires 0;
    }

    # ── SPA fallback — all paths → index.html (React Router handles routing) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
